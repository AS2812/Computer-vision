[build]
  command = "pnpm --filter @agrovision/web build"
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "10.33.0"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/assistant"
  to = "/.netlify/functions/assistant"
  status = 200

[[redirects]]
  from = "/api/analyze"
  to = "/.netlify/functions/analyze"
  status = 200

[[redirects]]
  from = "/api/market/tomato"
  to = "/.netlify/functions/market-tomato"
  status = 200

[[redirects]]
  from = "/api/treatments/tomato/:key"
  to = "/.netlify/functions/treatments-tomato/:key"
  status = 200

[[headers]]
  for = "/sw.js"
  [headers.values]
    # The SW script must always be revalidated so new deploys are detected;
    # the assets it caches are still long-lived via their own rules below.
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/models/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.wasm"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
