services:
  - type: web
    name: agrovision-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: "pip install uv && uv sync --project services/api --frozen --no-dev"
    startCommand: "uv run --project services/api uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: CORS_ORIGIN_REGEX
        value: "https://.*\\.netlify\\.app"
      - key: EXTERNAL_LLM_API_URL
        value: "https://opencode.ai/zen/v1/chat/completions"
      - key: EXTERNAL_LLM_MODEL
        value: "deepseek-v4-flash-free"
      - key: EXTERNAL_VISION_MODEL
        value: "mimo-v2.5-free"
      - key: EXTERNAL_LLM_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
